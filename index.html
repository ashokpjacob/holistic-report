<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Holistic Report Card</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Holistic Report Card</h1>
<button id="resetBtn">Reset Layout</button>
<button id="printBtn">Print Report</button>

<!-- place anywhere in your page (e.g., near your toolbar) -->
<div id="localstorage-tools" style="margin:8px 0;">
  <button id="exportBtn">Save localStorage (position.json)</button>
  <button id="importBtn">Load localStorage from file</button>
  <input id="importFile" type="file" accept=".json,application/json" style="display:none" />
</div>


<div id="pages"></div>


<script src="script.js"></script>
</body>
</html>
