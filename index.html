<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Holistic Report Card — Editor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/css/editor.css">
  <style>
    /* Menu bar styles */
    .menu-bar {
      display: flex;
      gap: 4px;
      align-items: center;
      margin: 8px 0;
    }
    .menu-item {
      position: relative;
      display: inline-block;
    }
    .menu-item-button {
      padding: 6px 12px;
      cursor: pointer;
      background: #f3f3f3;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      user-select: none;
    }
    .menu-item-button:hover {
      background: #e8e8e8;
    }
    .menu-dropdown {
      display: none;
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      min-width: 180px;
      z-index: 1000;
      border-radius: 4px;
      padding: 6px 0;
    }
    .menu-dropdown button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
    }
    .menu-dropdown button:hover {
      background: #f5f7fb;
    }
    .menu-dropdown hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 4px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Holistic Report Card</h1>
</header>

<div class="menu-bar">
  <div class="menu-item" id="file-menu" aria-label="File menu">
    <div class="menu-item-button" id="file-button" role="button" aria-haspopup="true" aria-expanded="false">File ▾</div>
    <div class="menu-dropdown" id="file-dropdown" role="menu" aria-label="File menu dropdown">
      <button id="saveLayoutBtn" role="menuitem">Save layout</button>
      <button id="exportLayoutBtn" role="menuitem">Export layout (download)</button>
      <button id="importLayoutBtn" role="menuitem">Import layout (load file)</button>
      <hr />
      <button id="printBtn" role="menuitem">Print Report</button>
    </div>
    <!-- hidden file input used for import -->
    <input id="importLayoutFile" type="file" accept="application/json" style="display:none" />
  </div>
  <div class="menu-item" id="edit-menu" aria-label="Edit menu">
    <div class="menu-item-button" id="edit-button" role="button" aria-haspopup="true" aria-expanded="false">Edit ▾</div>
    <div class="menu-dropdown" id="edit-dropdown" role="menu" aria-label="Edit menu dropdown">
      <button id="resetBtn" role="menuitem">Reset Layout</button>
    </div>
  </div>
</div>

<div id="app" class="app-shell">
  <aside id="sidebar" aria-label="Style sidebar">
    <h3>Style</h3>

    <div class="control">
      <label for="fontFamily">Font</label>
      <select id="fontFamily">
        <option value="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial">System UI</option>
        <option value="Arial, Helvetica, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Times New Roman', Times, serif">Times New Roman</option>
        <option value="'Courier New', monospace">Courier New</option>
      </select>
    </div>

    <div class="control">
      <label for="fontSize">Size (px)</label>
      <input id="fontSize" type="number" min="6" max="200" />
    </div>

    <div class="control">
      <label for="fontColor">Color</label>
      <input id="fontColor" type="color" />
    </div>

    <div class="control">
      <label for="bgColor">Background color</label>
      <input id="bgColor" type="color" value="#ffffff" />
      <label><input id="bgTransparent" type="checkbox" /> Transparent</label>
      <label for="bgOpacity">Opacity: <span id="bgOpacityValue">1.00</span></label>
      <input id="bgOpacity" type="range" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="control">
      <label for="bgImageUrl">Background image URL</label>
      <input id="bgImageUrl" type="url" placeholder="https://example.com/image.png" />
      <label for="bgImageOpacity">Image opacity: <span id="bgImageOpacityValue">1.00</span></label>
      <input id="bgImageOpacity" type="range" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="control">
      <label for="tableFillColor">Table fill color</label>
      <input id="tableFillColor" type="color" value="#ffffff" />
      <label><input id="tableFillTransparent" type="checkbox" /> Transparent</label>
      <label for="tableFillOpacity">Opacity: <span id="tableFillOpacityValue">1.00</span></label>
      <input id="tableFillOpacity" type="range" min="0" max="1" step="0.01" value="1" />
      <button id="applyTableFillBtn" type="button">Apply Table Fill</button>
    </div>

    <div class="control">
      <label><input id="boldToggle" type="checkbox" /> Bold</label>
      <label><input id="italicToggle" type="checkbox" /> Italic</label>
    </div>

    <div class="control">
      <button id="applyBtn">Apply</button>
      <button id="resetStyleBtn">Reset</button>
    </div>

    <hr />

    <div id="selectedInfo" aria-live="polite"></div>
  </aside>

  <main id="main">
    <div id="toolbar">
      <button id="toggleEdit">Toggle Edit Mode</button>
    </div>

    <section id="pages-wrapper">
      <!-- script.js will populate #pages with .a4-page elements -->
      <div id="pages"></div>
    </section>
  </main>
</div>

<script src="script.js" defer></script>
<script src="assets/js/editor.js" defer></script>
</body>
</html>
