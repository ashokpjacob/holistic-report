<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Background Image Adjuster</title>
  <style>
    :root {
      --ink: #1c3557;
      --muted: #5b6f8a;
      --accent: #1f6feb;
      --panel: #ffffff;
      --edge: #d7e1ef;
      --bg: linear-gradient(140deg, #f7fbff 0%, #edf4ff 60%, #fff6e7 100%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(23, 47, 79, 0.12);
      max-width: 540px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 18px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
    }
    input[type="range"], select {
      width: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .value {
      font-weight: 700;
      color: #173e7a;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: 1px solid #b8c8df;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: #2f4563;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Background Image Adjuster</h1>
    <p>Adjust size, position and repeat of the selected element background image.</p>

    <div class="row">
      <label for="sizeMode">Size mode</label>
      <select id="sizeMode">
        <option value="cover">Cover</option>
        <option value="contain">Contain</option>
        <option value="custom">Custom (%)</option>
      </select>
    </div>

    <div id="customSizeBlock" class="grid" style="display:none;">
      <div class="row">
        <label for="sizeX">Width <span id="sizeXValue" class="value">100%</span></label>
        <input id="sizeX" type="range" min="10" max="300" step="1" value="100" />
      </div>
      <div class="row">
        <label for="sizeY">Height <span id="sizeYValue" class="value">100%</span></label>
        <input id="sizeY" type="range" min="10" max="300" step="1" value="100" />
      </div>
    </div>

    <div class="grid">
      <div class="row">
        <label for="posX">Position X <span id="posXValue" class="value">50%</span></label>
        <input id="posX" type="range" min="0" max="100" step="1" value="50" />
      </div>
      <div class="row">
        <label for="posY">Position Y <span id="posYValue" class="value">50%</span></label>
        <input id="posY" type="range" min="0" max="100" step="1" value="50" />
      </div>
    </div>

    <div class="row">
      <label for="repeatMode">Repeat</label>
      <select id="repeatMode">
        <option value="no-repeat">No repeat</option>
        <option value="repeat">Repeat</option>
        <option value="repeat-x">Repeat X</option>
        <option value="repeat-y">Repeat Y</option>
      </select>
    </div>

    <div class="actions">
      <button id="resetBtn">Reset to Cover</button>
      <button id="closeBtn" class="primary">Done</button>
    </div>
    <div class="hint">Changes are applied live and saved with layout export.</div>
  </div>

  <script>
    const els = {
      sizeMode: document.getElementById('sizeMode'),
      sizeX: document.getElementById('sizeX'),
      sizeY: document.getElementById('sizeY'),
      posX: document.getElementById('posX'),
      posY: document.getElementById('posY'),
      repeatMode: document.getElementById('repeatMode'),
      customSizeBlock: document.getElementById('customSizeBlock'),
      sizeXValue: document.getElementById('sizeXValue'),
      sizeYValue: document.getElementById('sizeYValue'),
      posXValue: document.getElementById('posXValue'),
      posYValue: document.getElementById('posYValue'),
      resetBtn: document.getElementById('resetBtn'),
      closeBtn: document.getElementById('closeBtn')
    };

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, Number(num)));
    }

    function toInt(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function updateLabels() {
      els.sizeXValue.textContent = clamp(toInt(els.sizeX.value, 100), 10, 300) + '%';
      els.sizeYValue.textContent = clamp(toInt(els.sizeY.value, 100), 10, 300) + '%';
      els.posXValue.textContent = clamp(toInt(els.posX.value, 50), 0, 100) + '%';
      els.posYValue.textContent = clamp(toInt(els.posY.value, 50), 0, 100) + '%';
      els.customSizeBlock.style.display = els.sizeMode.value === 'custom' ? 'grid' : 'none';
    }

    function currentState() {
      return {
        sizeMode: els.sizeMode.value,
        sizeX: clamp(toInt(els.sizeX.value, 100), 10, 300),
        sizeY: clamp(toInt(els.sizeY.value, 100), 10, 300),
        posX: clamp(toInt(els.posX.value, 50), 0, 100),
        posY: clamp(toInt(els.posY.value, 50), 0, 100),
        repeat: els.repeatMode.value
      };
    }

    function postUpdate() {
      updateLabels();
      if (!window.opener) return;
      window.opener.postMessage({ type: 'hr-bg-adjuster-update', payload: currentState() }, '*');
    }

    function applyIncomingState(state) {
      if (!state || typeof state !== 'object') return;
      els.sizeMode.value = state.sizeMode || 'cover';
      els.sizeX.value = clamp(toInt(state.sizeX, 100), 10, 300);
      els.sizeY.value = clamp(toInt(state.sizeY, 100), 10, 300);
      els.posX.value = clamp(toInt(state.posX, 50), 0, 100);
      els.posY.value = clamp(toInt(state.posY, 50), 0, 100);
      els.repeatMode.value = state.repeat || 'no-repeat';
      updateLabels();
    }

    ['change', 'input'].forEach(ev => {
      [els.sizeMode, els.sizeX, els.sizeY, els.posX, els.posY, els.repeatMode].forEach(control => {
        control.addEventListener(ev, postUpdate);
      });
    });

    els.resetBtn.addEventListener('click', () => {
      applyIncomingState({ sizeMode: 'cover', sizeX: 100, sizeY: 100, posX: 50, posY: 50, repeat: 'no-repeat' });
      postUpdate();
    });

    els.closeBtn.addEventListener('click', () => window.close());

    window.addEventListener('message', (event) => {
      const msg = event && event.data ? event.data : null;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'hr-bg-adjuster-state') {
        applyIncomingState(msg.payload || {});
      }
    });

    updateLabels();
    if (window.opener) {
      window.opener.postMessage({ type: 'hr-bg-adjuster-ready' }, '*');
    }
  </script>
</body>
</html>
